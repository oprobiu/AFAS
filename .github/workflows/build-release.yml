name: Build and Release .apkg

on:
  workflow_call:
    inputs:
      deck-config:
        required: false
        type: string
        default: 'data/deck.json'
      tools-version:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout dataset repo
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }

      - name: Checkout AFAS tools
        uses: actions/checkout@v4
        with:
          repository: oprobiu/AFAS
          ref: ${{ inputs.tools-version }}
          path: .tools/AFAS

      - name: Install dependencies
        run: pip install -r .tools/AFAS/requirements.txt

      - name: Validate dataset
        run: python3 .tools/AFAS/scripts/validate.py --config ${{ inputs.deck-config }} --tools-dir .tools/AFAS

      - name: Build .apkg
        run: python3 .tools/AFAS/scripts/build_apkg.py --config ${{ inputs.deck-config }} --tools-dir .tools/AFAS

      - name: Determine artifact name
        id: name
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          python3 -c "
          import json
          cfg = json.load(open('${{ inputs.deck-config }}'))
          deck = cfg['deck_name']
          level = deck.split()[0] if deck[0].upper() in 'AB' else deck.replace(' ','_')
          fo = cfg.get('tts',{}).get('language','xx').split('-')[0]
          tag = '${TAG}'
          na = tag.rsplit('-',1)[-1] if '-' in tag else 'xx'
          print(f'artifact={level}-{fo}-{na}-{tag}.apkg')
          " >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        run: |
          SRC=$(ls build/*.apkg)
          mv "$SRC" "build/${{ steps.name.outputs.artifact }}"

      - name: Create or update release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Create release if it doesn't exist
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --generate-notes
          # Delete all existing assets from this release
          gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null | while read name; do
            gh release delete-asset "$TAG" "$name" -y 2>/dev/null || true
          done
          # Upload new asset
          gh release upload "$TAG" build/${{ steps.name.outputs.artifact }} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
